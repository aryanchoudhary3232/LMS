name: CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TAG: latest

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy To EC2
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare frontend env for Docker build
        run: echo "VITE_BACKEND_URL=${{ secrets.VITE_BACKEND_URL_PRODUCTION }}" > FRONTEND/.env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./BACKEND
          file: ./BACKEND/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-backend:${{ env.RELEASE_SHA }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./FRONTEND
          file: ./FRONTEND/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/lms-frontend:${{ env.RELEASE_SHA }}

      - name: Deploy application over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin
            git checkout main
            git pull --ff-only origin main
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            export IMAGE_TAG="${{ env.IMAGE_TAG }}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
