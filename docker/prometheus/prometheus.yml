global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend_render_prod
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets: ["lms-bx7u.onrender.com"]
        labels:
          env: prod
          source: render
          app: lms-backend

  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://lms-wine-nine.vercel.app
          - https://lms-bx7u.onrender.com/health
          - https://lms-bx7u.onrender.com/metrics
        labels:
          env: prod
          source: deployed-probe
          app: lms-deployed
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
