services:
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    container_name: lms-backend
    restart: unless-stopped
    env_file:
      - ./BACKEND/.env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      CORS_ORIGIN: ${BACKEND_CORS_ORIGIN:-http://localhost:8080,http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    container_name: lms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend_logs:
