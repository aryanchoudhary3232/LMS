services:
  backend:
    build:
      context: ./BACKEND
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/lms-backend:${IMAGE_TAG:-latest}
    pull_policy: missing
    container_name: lms-backend
    restart: unless-stopped
    env_file:
      - ./BACKEND/.env
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3000}
      ELASTICSEARCH_ENABLED: ${ELASTICSEARCH_ENABLED:-true}
      ELASTICSEARCH_NODE: ${ELASTICSEARCH_NODE:-http://elasticsearch:9200}
      ELASTICSEARCH_USERNAME: ${ELASTICSEARCH_USERNAME:-}
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD:-}
      ELASTICSEARCH_API_KEY: ${ELASTICSEARCH_API_KEY:-}
      ELASTICSEARCH_INDEX_COURSES: ${ELASTICSEARCH_INDEX_COURSES:-lms_courses}
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: lms-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "${ELASTICSEARCH_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fs http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: ./FRONTEND
      dockerfile: Dockerfile
    image: ${DOCKERHUB_USERNAME:-local}/lms-frontend:${IMAGE_TAG:-latest}
    pull_policy: missing
    container_name: lms-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend_logs:
  es_data:
